# Builds a stock LLVM 19.1.x distribution for Windows / MSVC 2022.
# This replaces the old pre-built "patched LLVM 15" zip. There are no
# custom source patches — only specific CMake configuration flags.
#
# Run manually via `workflow_dispatch`. Resulting zip is uploaded as a
# release asset (tag matches the LLVM version input). The Taichi
# `ti_build/llvm.py` script is expected to point at that release URL.

name: Build LLVM 19 for Windows

on:
  workflow_dispatch:
    inputs:
      llvm_tag:
        description: "LLVM git tag (e.g. llvmorg-19.1.7)"
        required: true
        default: "llvmorg-19.1.7"
      release_tag:
        description: "GitHub release tag to create / update"
        required: true
        default: "llvm19"

jobs:
  build-llvm19-windows:
    runs-on: windows-2022
    timeout-minutes: 360
    steps:
      - name: Checkout (for workflow metadata)
        uses: actions/checkout@v4

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup MSVC dev cmd
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Clone LLVM
        shell: pwsh
        run: |
          git clone --depth 1 --branch "${{ github.event.inputs.llvm_tag }}" https://github.com/llvm/llvm-project.git llvm-project

      - name: Configure LLVM
        shell: pwsh
        run: |
          $installDir = "${{ github.workspace }}\dist\taichi-llvm-19"
          cmake -S llvm-project/llvm -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="$installDir" `
            -DLLVM_ENABLE_PROJECTS="" `
            -DLLVM_TARGETS_TO_BUILD="X86;NVPTX;AMDGPU" `
            -DLLVM_EXPERIMENTAL_TARGETS_TO_BUILD="DirectX" `
            -DLLVM_ENABLE_RTTI=ON `
            -DLLVM_ENABLE_ASSERTIONS=OFF `
            -DLLVM_ENABLE_TERMINFO=OFF `
            -DLLVM_ENABLE_ZSTD=OFF `
            -DLLVM_ENABLE_ZLIB=OFF `
            -DLLVM_ENABLE_LIBXML2=OFF `
            -DLLVM_INCLUDE_TESTS=OFF `
            -DLLVM_INCLUDE_BENCHMARKS=OFF `
            -DLLVM_INCLUDE_EXAMPLES=OFF `
            -DLLVM_INCLUDE_DOCS=OFF `
            -DLLVM_BUILD_LLVM_C_DYLIB=OFF `
            -DLLVM_BUILD_TOOLS=OFF `
            -DLLVM_BUILD_UTILS=OFF `
            -DLLVM_HOST_TRIPLE=x86_64-pc-windows-msvc

      - name: Build & install LLVM
        shell: pwsh
        run: cmake --build build --target install --config Release

      - name: Package zip
        shell: pwsh
        run: |
          $zipName = "taichi-llvm-19-msvc2022.zip"
          Compress-Archive -Path "dist/taichi-llvm-19/*" -DestinationPath $zipName
          Get-FileHash $zipName -Algorithm SHA256 | Tee-Object -FilePath "$zipName.sha256.txt"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: LLVM 19 Windows MSVC2022
          files: |
            taichi-llvm-19-msvc2022.zip
            taichi-llvm-19-msvc2022.zip.sha256.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
